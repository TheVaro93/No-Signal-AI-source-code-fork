<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NO-SIGNAL — Mes personnages</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="style-character" href="character.css" />

</head>
<body>

  <!-- Header -->
  <header id="chars-header">
    <a href="/" class="logo">◈ NO-SIGNAL</a>
    <a href="/" id="back-link">← App</a>
    <div id="header-spacer"></div>
    <button id="btn-new-char">+ Nouveau personnage</button>
  </header>

  <!-- Main -->
  <main id="chars-main">
    <div id="chars-empty" class="hidden">
      <div class="empty-icon">◈</div>
      <div>Aucun personnage pour l'instant.</div>
      <div>Crée ton premier personnage pour commencer.</div>
    </div>
    <div id="chars-grid"></div>
  </main>

  <!-- Modal -->
  <div id="modal-overlay" class="hidden">
    <div id="modal-box" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <h2 id="modal-title">Nouveau personnage</h2>

      <form id="char-form">
        <div id="modal-error"></div>

        <!-- Avatar -->
        <div id="avatar-section">
          <div id="avatar-preview">◈</div>
          <div>
            <button type="button" id="btn-upload-avatar">Choisir une image</button>
            <input type="file" id="avatar-file-input" accept="image/*" aria-label="Image d'avatar" style="display:none" />
            <div id="upload-error"></div>
          </div>
        </div>

        <div class="field-group">
          <label class="field-label" for="field-name">Nom <span class="text-danger" aria-hidden="true">*</span></label>
          <input class="field-input" type="text" id="field-name" placeholder="Nom du personnage" maxlength="100" aria-required="true" />
        </div>

        <div class="field-group">
          <label class="field-label" for="field-personality">Personnalité</label>
          <textarea class="field-textarea" id="field-personality" placeholder="Décris la personnalité…" maxlength="1000"></textarea>
        </div>

        <div class="field-group">
          <label class="field-label" for="field-tone">Ton</label>
          <textarea class="field-textarea" id="field-tone" placeholder="Ton de voix, style d'expression…" maxlength="1000"></textarea>
        </div>

        <div class="field-group">
          <label class="field-label" for="field-style">Style d'ecriture</label>
          <textarea class="field-textarea" id="field-style"
            placeholder="Ex : reponses courtes, jamais de metaphores…" maxlength="1000"></textarea>
        </div>

        <div class="field-group">
          <label class="field-label" for="field-category">Categorie</label>
          <select class="field-input" id="field-category">
            <option value="autre">Autre</option>
            <option value="anime">Anime</option>
            <option value="fantasy">Fantasy</option>
            <option value="sci-fi">Sci-Fi</option>
            <option value="historique">Historique</option>
            <option value="original">Original</option>
          </select>
        </div>

        <div class="field-group">
          <label class="field-label" for="field-public">Visibilite</label>
          <label style="display:flex;align-items:center;gap:8px;cursor:pointer;">
            <input type="checkbox" id="field-public" />
            <span style="font-size:13px;color:var(--text-secondary);">
              Personnage public — visible par tous
            </span>
          </label>
        </div>

        <div class="field-group">
          <label class="field-label" for="field-lore">Lore</label>
          <textarea class="field-textarea" id="field-lore" placeholder="Histoire, contexte, background…" maxlength="2000"></textarea>
        </div>

        <div id="modal-actions">
          <button type="button" id="btn-modal-cancel">Annuler</button>
          <button type="submit" id="btn-modal-save">Sauvegarder</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Script loading order: supabase CDN → config.js (sets window.NO_SIGNAL_BACKEND_URL) → characters.js -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="characters.js"></script>
</body>
</html>
