<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NO-SIGNAL — Mes personnages</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    /* ── Page layout ── */
    #chars-header {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 56px;
      background: var(--bg-sidebar);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 16px;
      z-index: 100;
    }

    #chars-header .logo {
      font-size: 18px;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 0.06em;
      text-decoration: none;
    }

    #back-link {
      font-size: 13px;
      color: var(--text-secondary);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 4px;
      transition: color 0.15s;
    }
    #back-link:hover { color: var(--text-primary); }

    #header-spacer { flex: 1; }

    #btn-new-char {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 8px 16px;
      font-family: var(--font);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    #btn-new-char:hover { background: var(--accent-hover); }

    /* ── Main content ── */
    #chars-main {
      padding: 80px 24px 32px;
      max-width: 960px;
      margin: 0 auto;
    }

    #chars-empty {
      text-align: center;
      color: var(--text-muted);
      margin-top: 80px;
      font-size: 14px;
      line-height: 2;
    }
    #chars-empty .empty-icon { font-size: 40px; }

    /* ── Cards grid ── */
    #chars-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 16px;
    }

    .char-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .char-card-top {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .char-avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: var(--bg-sidebar);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
      overflow: hidden;
    }
    .char-avatar img { width: 100%; height: 100%; object-fit: cover; }

    .char-name {
      font-size: 15px;
      font-weight: 700;
      color: var(--text-primary);
    }

    .char-preview {
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.5;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }

    .char-actions {
      display: flex;
      gap: 8px;
      margin-top: 4px;
    }

    .btn-edit, .btn-delete {
      flex: 1;
      padding: 7px 12px;
      border-radius: 7px;
      font-family: var(--font);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid var(--border);
      transition: background 0.15s, color 0.15s;
    }
    .btn-edit  { background: transparent; color: var(--text-primary); }
    .btn-edit:hover { background: var(--bg-sidebar); }
    .btn-delete { background: transparent; color: var(--danger); border-color: rgba(224,90,90,0.3); }
    .btn-delete:hover { background: rgba(224,90,90,0.1); }

    /* ── Modal overlay ── */
    #modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200;
      padding: 20px;
    }

    #modal-box {
      background: var(--bg-sidebar);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 28px 24px;
      width: 100%;
      max-width: 480px;
      max-height: 90vh;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    #modal-title { font-size: 17px; font-weight: 700; color: var(--text-primary); }

    /* ── Form fields ── */
    .field-group  { display: flex; flex-direction: column; gap: 6px; }

    .field-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--text-secondary);
    }

    .field-input, .field-textarea {
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-primary);
      font-family: var(--font);
      font-size: 14px;
      padding: 10px 14px;
      outline: none;
      transition: border-color 0.15s;
      width: 100%;
    }
    .field-input:focus, .field-textarea:focus { border-color: var(--accent); }
    .field-input::placeholder, .field-textarea::placeholder { color: var(--text-muted); }
    .field-textarea { resize: vertical; min-height: 72px; }

    /* ── Avatar upload ── */
    #avatar-section { display: flex; align-items: center; gap: 16px; }

    #avatar-preview {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: var(--bg-card);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      overflow: hidden;
      flex-shrink: 0;
    }
    #avatar-preview img { width: 100%; height: 100%; object-fit: cover; }

    #btn-upload-avatar {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-primary);
      font-family: var(--font);
      font-size: 13px;
      font-weight: 600;
      padding: 8px 14px;
      cursor: pointer;
      transition: background 0.15s;
    }
    #btn-upload-avatar:hover { background: var(--bg-card); }

    #upload-error { font-size: 12px; color: var(--danger); display: none; }

    /* ── Modal actions ── */
    #modal-actions { display: flex; gap: 10px; margin-top: 4px; }

    #btn-modal-cancel {
      flex: 1;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-primary);
      font-family: var(--font);
      font-size: 14px;
      font-weight: 600;
      padding: 10px;
      cursor: pointer;
      transition: background 0.15s;
    }
    #btn-modal-cancel:hover { background: var(--bg-card); }

    #btn-modal-save {
      flex: 2;
      background: var(--accent);
      border: none;
      border-radius: 8px;
      color: #fff;
      font-family: var(--font);
      font-size: 14px;
      font-weight: 600;
      padding: 10px;
      cursor: pointer;
      transition: background 0.15s;
    }
    #btn-modal-save:hover  { background: var(--accent-hover); }
    #btn-modal-save:disabled { opacity: 0.5; cursor: not-allowed; }

    #modal-error {
      font-size: 13px;
      padding: 10px 12px;
      border-radius: 8px;
      background: rgba(224,90,90,0.15);
      border: 1px solid rgba(224,90,90,0.4);
      color: #f08080;
      display: none;
    }

    .text-danger { color: var(--danger); }
  </style>
</head>
<body>

  <!-- Header -->
  <header id="chars-header">
    <a href="/" class="logo">◈ NO-SIGNAL</a>
    <a href="/" id="back-link">← App</a>
    <div id="header-spacer"></div>
    <button id="btn-new-char">+ Nouveau personnage</button>
  </header>

  <!-- Main -->
  <main id="chars-main">
    <div id="chars-empty" class="hidden">
      <div class="empty-icon">◈</div>
      <div>Aucun personnage pour l'instant.</div>
      <div>Crée ton premier personnage pour commencer.</div>
    </div>
    <div id="chars-grid"></div>
  </main>

  <!-- Modal -->
  <div id="modal-overlay" class="hidden">
    <div id="modal-box" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <h2 id="modal-title">Nouveau personnage</h2>

      <form id="char-form">
        <div id="modal-error"></div>

        <!-- Avatar -->
        <div id="avatar-section">
          <div id="avatar-preview">◈</div>
          <div>
            <button type="button" id="btn-upload-avatar">Choisir une image</button>
            <input type="file" id="avatar-file-input" accept="image/*" aria-label="Image d'avatar" style="display:none" />
            <div id="upload-error"></div>
          </div>
        </div>

        <div class="field-group">
          <label class="field-label" for="field-name">Nom <span class="text-danger" aria-hidden="true">*</span></label>
          <input class="field-input" type="text" id="field-name" placeholder="Nom du personnage" maxlength="100" aria-required="true" />
        </div>

        <div class="field-group">
          <label class="field-label" for="field-personality">Personnalité</label>
          <textarea class="field-textarea" id="field-personality" placeholder="Décris la personnalité…" maxlength="1000"></textarea>
        </div>

        <div class="field-group">
          <label class="field-label" for="field-tone">Ton</label>
          <textarea class="field-textarea" id="field-tone" placeholder="Ton de voix, style d'expression…" maxlength="1000"></textarea>
        </div>

        <div class="field-group">
          <label class="field-label" for="field-lore">Lore</label>
          <textarea class="field-textarea" id="field-lore" placeholder="Histoire, contexte, background…" maxlength="2000"></textarea>
        </div>

        <div id="modal-actions">
          <button type="button" id="btn-modal-cancel">Annuler</button>
          <button type="submit" id="btn-modal-save">Sauvegarder</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Script loading order: supabase CDN → config.js (sets window.NO_SIGNAL_BACKEND_URL) → characters.js -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="characters.js"></script>
</body>
</html>
