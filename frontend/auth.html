<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NO-SIGNAL — Sign In</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: var(--bg-base);
    }

    #auth-wrapper {
      width: 100%;
      max-width: 400px;
      padding: 24px 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
    }

    #auth-logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    #auth-logo .logo-icon { font-size: 28px; color: var(--accent); }
    #auth-logo .logo-text  { font-size: 22px; font-weight: 700; letter-spacing: 0.08em; }

    #auth-card {
      background: var(--bg-sidebar);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 28px 24px;
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .auth-tabs {
      display: flex;
      gap: 4px;
      background: var(--bg-card);
      border-radius: 8px;
      padding: 4px;
    }

    .auth-tab {
      flex: 1;
      padding: 8px 12px;
      border: none;
      border-radius: 6px;
      background: transparent;
      color: var(--text-secondary);
      font-family: var(--font);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }

    .auth-tab.active {
      background: var(--accent);
      color: #fff;
    }

    .auth-tab:hover:not(.active) {
      color: var(--text-primary);
    }

    .auth-form {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .auth-form.hidden { display: none; }

    .auth-form label {
      display: flex;
      flex-direction: column;
      gap: 5px;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--text-secondary);
    }

    .auth-form input {
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-primary);
      font-family: var(--font);
      font-size: 14px;
      padding: 10px 14px;
      outline: none;
      transition: border-color 0.15s;
      width: 100%;
    }

    .auth-form input:focus { border-color: var(--accent); }
    .auth-form input::placeholder { color: var(--text-muted); }

    .auth-submit {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 11px 16px;
      font-family: var(--font);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      width: 100%;
      margin-top: 4px;
    }

    .auth-submit:hover { background: var(--accent-hover); }
    .auth-submit:disabled { opacity: 0.5; cursor: not-allowed; }

    .auth-message {
      font-size: 13px;
      padding: 10px 12px;
      border-radius: 8px;
      display: none;
    }

    .auth-message.error {
      background: rgba(224, 90, 90, 0.15);
      border: 1px solid rgba(224, 90, 90, 0.4);
      color: #f08080;
      display: block;
    }

    .auth-message.success {
      background: rgba(90, 200, 120, 0.15);
      border: 1px solid rgba(90, 200, 120, 0.4);
      color: #6dca8a;
      display: block;
    }

    #auth-tagline {
      font-size: 12px;
      color: var(--text-muted);
      letter-spacing: 0.06em;
      text-align: center;
    }
  </style>
</head>
<body>
  <div id="auth-wrapper">
    <div id="auth-logo">
      <span class="logo-icon">◈</span>
      <span class="logo-text">NO-SIGNAL</span>
    </div>

    <div id="auth-card">
      <div class="auth-tabs">
        <button class="auth-tab active" id="tab-login" data-tab="login">Sign In</button>
        <button class="auth-tab" id="tab-register" data-tab="register">Register</button>
      </div>

      <!-- Login form -->
      <form class="auth-form" id="form-login">
        <div id="login-message" class="auth-message"></div>
        <label>Email
          <input type="email" id="login-email" placeholder="you@example.com" required autocomplete="email" />
        </label>
        <label>Password
          <input type="password" id="login-password" placeholder="••••••••" required autocomplete="current-password" />
        </label>
        <button type="submit" class="auth-submit" id="btn-login-submit">Sign In</button>
      </form>

      <!-- Register form -->
      <form class="auth-form hidden" id="form-register">
        <div id="register-message" class="auth-message"></div>
        <label>Email
          <input type="email" id="register-email" placeholder="you@example.com" required autocomplete="email" />
        </label>
        <label>Password
          <input type="password" id="register-password" placeholder="Min. 6 characters" required autocomplete="new-password" />
        </label>
        <button type="submit" class="auth-submit" id="btn-register-submit">Create Account</button>
      </form>
    </div>

    <p id="auth-tagline">Control the character. Control the story.</p>
  </div>

  <script src="config.js"></script>
  <script src="auth.js"></script>
</body>
</html>
